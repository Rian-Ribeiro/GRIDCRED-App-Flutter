name: gridcred_app
description: "GRIDCRED - Portal de Créditos GD Multiluz Fácil"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP + Auth
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.71.0

  # Files
  path_provider: ^2.1.5
  open_filex: ^4.6.0
  permission_handler: ^11.4.0
  share_plus: ^11.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
